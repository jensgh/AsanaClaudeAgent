services:
  asana-claude-agent:
    build: .
    environment:
      - ASANA_TOKEN=${ASANA_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - Asana__WorkspaceGid=${ASANA_WORKSPACE_GID}
      - Claude__MonorepoPath=/repo
      - Claude__DangerouslySkipPermissions=true
      - App__StateFilePath=/app/state/state.json
      - App__LocksDirectory=/app/state/locks
    volumes:
      - /home/jens/repos/monorepo:/repo
      - ./state:/app/state
    restart: unless-stopped
